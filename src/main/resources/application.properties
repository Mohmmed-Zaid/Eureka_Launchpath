# ========================
# SERVER
# ========================
server.port=${PORT:8761}

# ========================
# APP
# ========================
spring.application.name=${APP_NAME:eureka-server}

# ========================
# EUREKA CLIENT CONFIG
# ========================
eureka.client.register-with-eureka=${EUREKA_REGISTER:false}
eureka.client.fetch-registry=${EUREKA_FETCH:false}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ========================
# EUREKA SERVER CONFIG
# ========================
eureka.server.eviction-interval-timer-in-ms=${EUREKA_EVICTION_INTERVAL:5000}
eureka.server.enable-self-preservation=${EUREKA_SELF_PRESERVATION:false}